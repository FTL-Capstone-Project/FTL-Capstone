<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orbis</title>
    <!-- Favicon: the Orbis planet-"O". The href is set by the script below to the light/dark
         variant so the tab icon matches the machine's theme. -->
    <link id="favicon" rel="icon" type="image/svg+xml" href="/favicon-light.svg" />
    <!-- Set the theme BEFORE React/CSS paint so there's no flash on reload. The saved
         PREFERENCE is "light" | "dark" | "system" (default system = follow the OS). An
         explicit light/dark wins; system resolves against prefers-color-scheme. -->
    <script>
      (function () {
        try {
          var osDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var pref = localStorage.getItem("orbis-theme"); // light | dark | system | null
          // PAGE theme: explicit light/dark wins; otherwise follow the OS.
          var theme = (pref === "light" || pref === "dark") ? pref : (osDark ? "dark" : "light");
          document.documentElement.setAttribute("data-theme", theme);
          // FAVICON: always follow the OS (the browser TAB BAR), NOT the page theme — a light
          // favicon on a dark tab bar vanishes. So pick the variant from prefers-color-scheme.
          var fav = document.getElementById("favicon");
          var favVariant = osDark ? "dark" : "light";
          if (fav) fav.href = "/favicon-" + favVariant + ".svg?v=" + favVariant;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
