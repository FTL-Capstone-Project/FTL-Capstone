<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orbis</title>
    <!-- Set the theme BEFORE React/CSS paint so there's no light-mode flash on a
         dark-mode reload. Reads the saved choice; falls back to the OS preference. -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("orbis-theme");
          var theme = saved || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
          document.documentElement.setAttribute("data-theme", theme);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
