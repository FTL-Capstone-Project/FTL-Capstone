<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Orbis mark: the planet-"O" + tilted orbital ring, in the DARK-theme brand blue (#3B82F6,
       lifted so it reads against a dark tab bar). Shown on a dark-mode machine. -->
  <circle cx="16" cy="16" r="8.5" fill="none" stroke="#3B82F6" stroke-width="3.4"/>
  <ellipse cx="16" cy="16" rx="14" ry="5.2" fill="none" stroke="#3B82F6" stroke-width="2.4"
           transform="rotate(-25 16 16)"/>
</svg>
