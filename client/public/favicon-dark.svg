<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <!-- Orbis planet-"O" — DARK tab variant (light-blue halo + gray accents read on a dark bar).
       Composition pulled in from the edges so the orbiting moon doesn't clip at tab size. -->
  <!-- Inner blue planet -->
  <circle cx="250" cy="250" r="96" fill="#2d5ef7" />
  <!-- Gray separator -->
  <circle cx="250" cy="250" r="121" fill="none" stroke="#5a6065" stroke-width="9" />
  <!-- Light-blue halo ring -->
  <circle cx="250" cy="250" r="147" fill="none" stroke="#a1d6fd" stroke-width="46" />
  <!-- Orbit + satellite (moon sits ON the orbit path, inset so it never touches the edge) -->
  <g transform="rotate(-22 250 250)">
    <ellipse cx="250" cy="250" rx="196" ry="78" fill="none" stroke="#5a6065" stroke-width="12" />
    <circle cx="446" cy="250" r="21" fill="#a1d6fd" stroke="#5a6065" stroke-width="9" />
  </g>
</svg>
