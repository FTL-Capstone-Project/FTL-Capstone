<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <!-- Orbis planet-"O" — LIGHT tab variant. Matches the real logo: a BIG bright-blue planet with
       a THIN navy outline (not a heavy dark donut) + a thin navy orbit ring crossing it. Navy is
       used sparingly as outlines so the mark stays airy/blue like the wordmark's "O". -->
  <!-- Bright-blue planet (dominant) with a thin navy outline -->
  <circle cx="250" cy="250" r="146" fill="#0f6bff" stroke="#0a2540" stroke-width="15" />
  <!-- Orbit ring + satellite: thin navy, the accent that makes it a planet, not just a dot. Moon
       inset so it never clips the canvas edge at tab size. -->
  <g transform="rotate(-22 250 250)">
    <ellipse cx="250" cy="250" rx="198" ry="80" fill="none" stroke="#0a2540" stroke-width="15" />
    <circle cx="444" cy="250" r="25" fill="#0f6bff" stroke="#0a2540" stroke-width="11" />
  </g>
</svg>
