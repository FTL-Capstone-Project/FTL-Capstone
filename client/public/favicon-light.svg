<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Orbis planet-"O", SIMPLIFIED for favicon legibility (reads at 16px): a big solid blue
       planet + a bold navy orbital ring. Detail like the tiny moon is dropped on purpose — it
       turns to mush at tab size. LIGHT variant: navy ring reads on a light tab bar. -->
  <circle cx="16" cy="16" r="9.5" fill="#2563EB"/>
  <ellipse cx="16" cy="16" rx="14.5" ry="6.2" fill="none" stroke="#0A2540" stroke-width="3.2"
           transform="rotate(-20 16 16)"/>
</svg>
