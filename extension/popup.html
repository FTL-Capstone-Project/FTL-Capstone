<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header class="topbar">
    <span class="brand">
      <!-- The real Orbis wordmark. Two variants toggled by system theme (CSS): the dark-text logo
           on a light popup, the light-text logo on a dark popup. Transparent, no box. -->
      <img class="brand-logo brand-logo--light" src="assets/orbis-logo.png" alt="Orbis" height="26" />
      <img class="brand-logo brand-logo--dark" src="assets/orbis-logo-dark.png" alt="Orbis" height="26" />
      <img class="brand-orbo" src="assets/orbo-wave.png" alt="Orbo" width="30" height="30" />
    </span>
    <button id="settings-link" class="settings-btn" title="Settings">Settings</button>
  </header>
  <main id="content">
    <!-- states are rendered here by popup.js -->
  </main>
  <script src="api.js"></script>
  <script src="popup.js"></script>
</body>
</html>
